<!DOCTYPE html>
<html lang="es">
    <head>

        <link rel="stylesheet" href="css/logSing.css">
        <title>
            Registrarse
        </title>
    </head>
    <body>
        <div class="degradado">
            <section>
                <form id="singUpForm">
                    <div class="container">
                        <h1>Regístrese</h1>

                        <p>Ya tienes una cuenta? <a href="login.html">Inicia Sesión</a></p>

                </form>
            </section>
        </div>
